<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  html, body { margin: 0; }
  .canvas {
    width: 1400px; height: 560px; box-sizing: border-box; background: #4f6f92;
    display: flex; align-items: center; justify-content: space-between; gap: 60px;
    padding: 0 100px; font-family: system-ui, "Segoe UI", sans-serif; overflow: hidden;
  }
  .left { color: #fff; max-width: 660px; }
  .brand { display: flex; align-items: center; gap: 22px; margin-bottom: 30px; }
  .brand img { width: 92px; height: 92px; border-radius: 20px; }
  .brand .name { font-size: 54px; font-weight: 600; }
  .left h2 { font-size: 32px; font-weight: 500; margin: 0 0 16px; line-height: 1.25; }
  .left p { font-size: 20px; color: #d7e1eb; margin: 0; line-height: 1.5; }

  .menu {
    background: #fff; border-radius: 12px; box-shadow: 0 16px 44px rgba(10,25,40,.34);
    padding: 8px; width: 300px; font-size: 17px; color: #2a3540;
  }
  .mh { display: flex; align-items: center; gap: 10px; padding: 10px 12px; color: #6b7a89; font-size: 13px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; }
  .mh img { width: 22px; height: 22px; border-radius: 5px; }
  .mi { display: flex; align-items: center; justify-content: space-between; padding: 11px 14px; border-radius: 7px; }
  .mi .arr { color: #9aa6b1; }
  .mi.sel { background: #5b7ea6; color: #fff; }
  .mi.sel .arr { color: #e8eef5; }
  .sep { border-top: 1px solid #eceff3; margin: 5px 8px; }
</style>
</head>
<body>
  <div class="canvas">
    <div class="left">
      <div class="brand">
        <img src="logo-hd.png" alt="" />
        <span class="name">TTM Connect</span>
      </div>
      <h2>Your TextTemplateManager templates, right where you type.</h2>
      <p>Right-click any editable field — a Jira comment, an email, a web form — and paste a saved template with its formatting intact.</p>
    </div>

    <div class="menu">
      <div class="mh"><img src="logo-hd.png" alt="">TTM Connect</div>
      <div class="sep"></div>
      <div class="mi">Greetings <span class="arr">▸</span></div>
      <div class="mi">Signatures <span class="arr">▸</span></div>
      <div class="mi sel">Kind regards</div>
      <div class="mi">Password reset steps</div>
      <div class="mi">Ticket resolved</div>
    </div>
  </div>
</body>
</html>
