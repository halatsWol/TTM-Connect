<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  html, body { margin: 0; }
  .canvas {
    width: 440px; height: 280px; box-sizing: border-box; background: #4f6f92;
    display: flex; align-items: center; justify-content: center;
    font-family: system-ui, "Segoe UI", sans-serif; overflow: hidden;
  }
  .card {
    width: 372px; height: 212px; background: #fff; border-radius: 16px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    box-shadow: 0 10px 30px rgba(20,40,60,.28);
  }
  .card img { width: 72px; height: 72px; border-radius: 14px; }
  .name { font-size: 30px; font-weight: 600; color: #1f3247; margin: 14px 0 6px; }
  .tag { font-size: 14px; color: #5f6f7e; text-align: center; max-width: 300px; line-height: 1.4; }
</style>
</head>
<body>
  <div class="canvas">
    <div class="card">
      <img src="logo-hd.png" alt="" />
      <div class="name">TTM Connect</div>
      <div class="tag">Text templates in your right-click menu</div>
    </div>
  </div>
</body>
</html>
